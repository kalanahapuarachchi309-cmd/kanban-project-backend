spring.application.name=Kanban_board
# ==============================
# DataSource - MySQL
# ==============================
spring.datasource.url=jdbc:mysql://localhost:3306/kanban_board?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================
# JPA / Hibernate
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ==============================
# JWT
# ==============================
app.jwt.secret=your_super_secret_key_at_least_256_bits_long_change_in_production
app.jwt.expiration-ms=86400000

# ==============================
# Cloudinary
# ==============================
cloudinary.cloud-name=dymnfwem6
cloudinary.api-key=933432719953574
cloudinary.api-secret=PASTE_FULL_CLOUDINARY_API_SECRET_HERE

# ==============================
# Email (SMTP / Gmail App Password)
# ==============================
app.email.from=your_gmail_address@gmail.com
app.frontend-url=http://localhost:3000

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_gmail_address@gmail.com
spring.mail.password=your_gmail_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ==============================
# Server
# ==============================
server.port=8080

# ==============================
# Multipart Upload
# ==============================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
